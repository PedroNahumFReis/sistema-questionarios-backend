spring.application.name=BackEndTrab2
server.port=8080

# Banco H2 em Memória
spring.datasource.url=jdbc:h2:mem:questionarios_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT Secret
jwt.secret=4f6d8a9b2c1e3f5a7d9b0c2e4f6a8c0e2d4f6b8a0c2e4f6a8c0e2d4f6b8a0c2e
jwt.expiration=86400000

# Desabilitando e-mail real para testes rápidos (opcional: comente caso queira testar o e-mail real)
# spring.mail.host=smtp.gmail.com...

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Configuração Fictícia de E-mail (Apenas para a aplicação ligar)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=teste
spring.mail.password=teste
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
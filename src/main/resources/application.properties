# ============================================================
#  application.properties — configurações da aplicação
#  Formato: chave=valor. O Spring Boot lê este arquivo ao iniciar.
#  A sintaxe ${VARIAVEL:padrao} usa a variável de ambiente VARIAVEL; se ela nao existir,
#  usa o valor "padrao" que vem depois dos dois-pontos.
# ============================================================

# Nome da aplicacao (aparece em logs) e porta em que o servidor sobe.
spring.application.name=BackEndTrab2
server.port=8080

# ---------- Banco de dados MySQL (RNF02) ----------
# createDatabaseIfNotExist=true faz o MySQL criar o schema "questionarios_db" sozinho se nao existir.
# Usuario/senha/URL podem ser trocados por variavel de ambiente (DB_URL, DB_USER, DB_PASSWORD)
# sem editar este arquivo. O padrao da senha e apenas um placeholder ("changeme"): a senha real
# deve vir da variavel de ambiente DB_PASSWORD, para nao ficar versionada no git.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/questionarios_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialeto que ensina o Hibernate a gerar SQL especifico do MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ddl-auto=update: o Hibernate cria/atualiza as tabelas conforme as entidades @Entity, sem apagar dados.
spring.jpa.hibernate.ddl-auto=update
# Mostra no console o SQL executado (util para aprender/depurar; pode desligar em producao).
spring.jpa.show-sql=true

# ---------- JWT (RF03/RNF04) ----------
# jwt.secret: chave secreta usada para assinar os tokens. Em producao, deve ser secreta e vir de ambiente.
# jwt.expiration: validade do token em milissegundos (86400000 ms = 24 horas).
jwt.secret=4f6d8a9b2c1e3f5a7d9b0c2e4f6a8c0e2d4f6b8a0c2e4f6a8c0e2d4f6b8a0c2e
jwt.expiration=86400000

# ---------- Swagger / OpenAPI (RF16) ----------
# Caminhos da documentacao: JSON em /api-docs e a interface visual em /swagger-ui.html.
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------- E-mail (RF09) ----------
# Configuracao ficticia (host localhost:2525 nao existe de verdade). Serve apenas para a aplicacao
# subir; o envio real falha, mas o EmailService trata a falha e apenas registra o link no log.
# Para envio real, troque host/porta/usuario/senha por um SMTP verdadeiro (ex.: Gmail com senha de app).
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=teste
spring.mail.password=teste
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
